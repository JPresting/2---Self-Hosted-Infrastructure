<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300" role="img" aria-labelledby="title desc">
<title id="title">Request path behind a tunnel</title>
<desc id="desc">The browser speaks https to the edge, where TLS terminates. Everything after that is plain http inside the host. Environment variables describe the first segment, the Coolify domain field describes the last.</desc>
<style>
  .bg { fill: #ffffff; }
  .t  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #1f2328; }
  .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #656d76; }
  .line { stroke: #656d76; stroke-width: 1.5; fill: none; }
  .bracket { stroke: #8c959f; stroke-width: 0.8; fill: none; }
  .leader { stroke: #8c959f; stroke-width: 0.8; stroke-dasharray: 3 3; fill: none; }
  .b-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
  .b-teal   text { fill: #085041; }
  .b-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .b-gray   text { fill: #444441; }
  .b-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .b-purple text { fill: #3C3489; }
  @media (prefers-color-scheme: dark) {
    .bg { fill: #0d1117; }
    .t  { fill: #e6edf3; }
    .ts { fill: #9198a1; }
    .line { stroke: #9198a1; }
    .bracket { stroke: #6e7681; }
    .leader { stroke: #6e7681; }
    .b-teal   rect { fill: #085041; stroke: #5DCAA5; }
    .b-teal   text { fill: #9FE1CB; }
    .b-gray   rect { fill: #444441; stroke: #B4B2A9; }
    .b-gray   text { fill: #D3D1C7; }
    .b-purple rect { fill: #3C3489; stroke: #AFA9EC; }
    .b-purple text { fill: #CECBF6; }
  }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="bg" x="0" y="0" width="680" height="300"/>

<g class="b-teal">
  <rect x="30" y="90" width="100" height="44" rx="8" stroke-width="0.8"/>
  <text class="t" x="80" y="112" text-anchor="middle" dominant-baseline="central">Browser</text>
</g>
<g class="b-teal">
  <rect x="165" y="90" width="110" height="44" rx="8" stroke-width="0.8"/>
  <text class="t" x="220" y="112" text-anchor="middle" dominant-baseline="central">Edge / CDN</text>
</g>
<g class="b-gray">
  <rect x="310" y="90" width="100" height="44" rx="8" stroke-width="0.8"/>
  <text class="t" x="360" y="112" text-anchor="middle" dominant-baseline="central">Tunnel</text>
</g>
<g class="b-gray">
  <rect x="445" y="90" width="100" height="44" rx="8" stroke-width="0.8"/>
  <text class="t" x="495" y="112" text-anchor="middle" dominant-baseline="central">Traefik</text>
</g>
<g class="b-purple">
  <rect x="580" y="90" width="80" height="44" rx="8" stroke-width="0.8"/>
  <text class="t" x="620" y="112" text-anchor="middle" dominant-baseline="central">App</text>
</g>

<line class="line" x1="134" y1="112" x2="161" y2="112" marker-end="url(#arrow)"/>
<line class="line" x1="279" y1="112" x2="306" y2="112" marker-end="url(#arrow)"/>
<line class="line" x1="414" y1="112" x2="441" y2="112" marker-end="url(#arrow)"/>
<line class="line" x1="549" y1="112" x2="576" y2="112" marker-end="url(#arrow)"/>

<text class="ts" x="147" y="80" text-anchor="middle">https</text>
<text class="ts" x="292" y="80" text-anchor="middle">http</text>
<text class="ts" x="427" y="80" text-anchor="middle">http</text>
<text class="ts" x="562" y="80" text-anchor="middle">http</text>

<text class="ts" x="220" y="44" text-anchor="middle">TLS terminates here</text>
<line class="leader" x1="220" y1="52" x2="220" y2="86"/>

<path class="bracket" d="M30 158 L30 174 L275 174 L275 158"/>
<text class="t"  x="152" y="196" text-anchor="middle" dominant-baseline="central">Environment variables</text>
<text class="ts" x="152" y="216" text-anchor="middle" dominant-baseline="central">https — plain string</text>
<text class="ts" x="152" y="234" text-anchor="middle" dominant-baseline="central">OAuth and webhook URLs</text>

<path class="bracket" d="M310 158 L310 174 L660 174 L660 158"/>
<text class="t"  x="485" y="196" text-anchor="middle" dominant-baseline="central">Coolify domain field</text>
<text class="ts" x="485" y="216" text-anchor="middle" dominant-baseline="central">http — real routing</text>
<text class="ts" x="485" y="234" text-anchor="middle" dominant-baseline="central">renders the Traefik labels</text>

<text class="ts" x="340" y="274" text-anchor="middle">Both describe app.example.com — but different segments of the path</text>
</svg>
